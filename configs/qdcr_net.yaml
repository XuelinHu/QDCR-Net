experiment:
  name: qdcr_net_full
  seed: 42
  output_dir: outputs/checkpoints/qdcr_net_full

dataset:
  train_root: data/datasets/URPC2018/train
  val_root: data/datasets/URPC2018/val
  enhanced_root: data/datasets/URPC2018_enhanced
  num_classes: 4
  class_names:
    - holothurian
    - echinus
    - starfish
    - scallop
  image_size: 640
  workers: 4

model:
  name: qdcr_net
  backbone: dual_branch
  quality_aware: true
  cross_residual_stages:
    - stage2
    - stage3
  small_object_neck: true

train:
  epochs: 300
  batch_size: 16
  optimizer: adamw
  lr: 0.0005
  weight_decay: 0.0005

eval:
  conf_thresh: 0.25
  iou_thresh: 0.5
