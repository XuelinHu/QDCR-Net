experiment:
  name: baseline_brackish_sample
  seed: 42
  output_dir: outputs/checkpoints/baseline_brackish_sample
  runs_dir: runs/baseline_brackish_sample
  device: cuda

dataset:
  train_root: data/datasets/downloads/Brackish/train/images
  val_root: data/datasets/downloads/Brackish/valid/images
  enhanced_root: data/datasets/downloads/Brackish/train/images
  num_classes: 6
  synthetic_size: 0
  max_objects: 8
  class_names:
    - crab
    - fish
    - jellyfish
    - shrimp
    - small_fish
    - starfish
  image_size: 320
  workers: 4

model:
  name: baseline_detector
  feature_dim: 32
  num_queries: 8
  backbone: single_branch
  head: detect_proxy

train:
  epochs: 3
  batch_size: 4
  max_batches_per_epoch: 8
  optimizer: adamw
  lr: 0.0005
  weight_decay: 0.0005

eval:
  max_batches: 8
  conf_thresh: 0.25
  iou_thresh: 0.5
