experiment:
  name: baseline_detector_tuned
  seed: 42
  output_dir: outputs/checkpoints/baseline_detector_tuned
  runs_dir: runs/baseline_detector_tuned
  device: cuda

dataset:
  name: uov2
  train_root: data/datasets/downloads/UOv2/train/images
  val_root: data/datasets/downloads/UOv2/valid/images
  enhanced_root: data/datasets/downloads/UOv2/train/images
  num_classes: 5
  synthetic_size: 0
  max_objects: 16
  class_names:
    - echinus
    - holothurian
    - scallop
    - starfish
    - waterweeds
  image_size: 640
  workers: 4

model:
  name: baseline_detector
  feature_dim: 64
  num_queries: 16
  backbone: single_branch
  head: detect_proxy

train:
  epochs: 120
  batch_size: 4
  max_batches_per_epoch: 0
  optimizer: adamw
  lr: 0.0003
  weight_decay: 0.0005
  early_stopping:
    enabled: true
    monitor: loss
    mode: min
    patience: 15
    min_delta: 0.0005

eval:
  checkpoint: best
  max_batches: 0
  conf_thresh: 0.05
  iou_thresh: 0.5
