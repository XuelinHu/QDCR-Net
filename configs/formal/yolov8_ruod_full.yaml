experiment:
  name: yolov8_ruod_full
  seed: 42
  output_dir: outputs/checkpoints/yolov8_ruod_full
  runs_dir: runs/yolov8_ruod_full
  device: cuda
dataset:
  name: ruod
  train_root: data/datasets/downloads/RUOD/RUOD/train/images
  val_root: data/datasets/downloads/RUOD/RUOD/valid/images
  enhanced_root: data/datasets/downloads/RUOD/RUOD/train/images
  num_classes: 4
  synthetic_size: 0
  max_objects: 32
  class_names: [holothurian, echinus, starfish, scallop]
  image_size: 640
  workers: 4
model:
  name: yolov8
  weights: yolov8n.pt
train:
  epochs: 100
  batch_size: 16
  lr: 0.01
  weight_decay: 0.0005
  early_stopping: {patience: 20}
eval:
  split: val
  conf_thresh: 0.25
  iou_thresh: 0.5
