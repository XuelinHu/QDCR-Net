experiment:
  name: baseline_ruod_full
  seed: 42
  output_dir: outputs/checkpoints/baseline_ruod_full
  runs_dir: runs/baseline_ruod_full
  device: cuda

dataset:
  train_root: data/datasets/downloads/RUOD/RUOD/train/images
  val_root: data/datasets/downloads/RUOD/RUOD/valid/images
  enhanced_root: data/datasets/downloads/RUOD/RUOD/train/images
  num_classes: 4
  synthetic_size: 0
  max_objects: 8
  class_names:
    - holothurian
    - echinus
    - starfish
    - scallop
  image_size: 320
  workers: 4

model:
  name: baseline_detector
  feature_dim: 32
  num_queries: 8
  backbone: single_branch
  head: detect_proxy

train:
  epochs: 100
  batch_size: 4
  max_batches_per_epoch: 0
  optimizer: adamw
  lr: 0.0005
  weight_decay: 0.0005
  early_stopping:
    enabled: true
    monitor: loss
    mode: min
    patience: 10
    min_delta: 0.0005

eval:
  checkpoint: best
  max_batches: 0
  conf_thresh: 0.25
  iou_thresh: 0.5
