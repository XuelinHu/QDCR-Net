experiment:
  name: qdcr_ruod_testc_eval
  seed: 42
  output_dir: outputs/checkpoints/qdcr_ruod_full
  runs_dir: runs/qdcr_ruod_testc_eval
  device: cuda

dataset:
  name: ruod_testc
  train_root: data/datasets/downloads/RUOD/RUOD/train/images
  val_root: data/datasets/downloads/RUOD/RUOD/testc/images
  enhanced_root: data/datasets/downloads/RUOD/RUOD/train/images
  num_classes: 4
  synthetic_size: 0
  max_objects: 8
  class_names:
    - holothurian
    - echinus
    - starfish
    - scallop
  image_size: 320
  workers: 4

model:
  name: qdcr_net
  feature_dim: 32
  num_queries: 8
  backbone: dual_branch
  quality_aware: true
  cross_residual_stages:
    - stage2
    - stage3
  small_object_neck: true

train:
  epochs: 100
  batch_size: 4
  max_batches_per_epoch: 0
  optimizer: adamw
  lr: 0.001
  weight_decay: 0.0005

eval:
  checkpoint: best
  max_batches: 0
  conf_thresh: 0.25
  iou_thresh: 0.5
