experiment:
  name: faster_rcnn_brackish_rf_full
  seed: 42
  output_dir: outputs/checkpoints/faster_rcnn_brackish_rf_full
  runs_dir: runs/faster_rcnn_brackish_rf_full
  device: cuda
dataset:
  name: brackish_rf
  train_root: data/datasets/downloads/Brackish/train/images
  val_root: data/datasets/downloads/Brackish/valid/images
  enhanced_root: data/datasets/downloads/Brackish/train/images
  num_classes: 6
  synthetic_size: 0
  max_objects: 32
  class_names: [crab, fish, jellyfish, shrimp, small_fish, starfish]
  image_size: 640
  workers: 4
model:
  name: faster_rcnn
train:
  epochs: 20
  batch_size: 2
  max_batches_per_epoch: 0
  lr: 0.005
  weight_decay: 0.0005
eval:
  split: val
  conf_thresh: 0.25
  iou_thresh: 0.5
