experiment:
  name: underwater_enhance_det_brackish_rf_full
  seed: 42
  output_dir: outputs/checkpoints/underwater_enhance_det_brackish_rf_full
  runs_dir: runs/underwater_enhance_det_brackish_rf_full
  device: cuda
dataset:
  name: brackish_rf
  train_root: data/datasets/downloads/Brackish/train/images
  val_root: data/datasets/downloads/Brackish/valid/images
  enhanced_root: data/datasets/downloads/Brackish/train/images
  num_classes: 6
  synthetic_size: 0
  max_objects: 32
  class_names: [crab, fish, jellyfish, shrimp, small_fish, starfish]
  image_size: 640
  workers: 4
model:
  name: underwater_enhance_yolov8
  weights: yolov8n.pt
train:
  epochs: 100
  batch_size: 16
  lr: 0.01
  weight_decay: 0.0005
  early_stopping: {patience: 20}
eval:
  split: val
  conf_thresh: 0.25
  iou_thresh: 0.5
