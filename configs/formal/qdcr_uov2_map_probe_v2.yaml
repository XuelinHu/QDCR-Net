experiment:
  name: qdcr_uov2_map_probe_v2
  seed: 42
  output_dir: outputs/checkpoints/qdcr_uov2_map_probe_v2
  runs_dir: runs/qdcr_uov2_map_probe_v2
  device: cuda

dataset:
  name: uov2
  train_root: data/datasets/downloads/UOv2/train/images
  val_root: data/datasets/downloads/UOv2/valid/images
  enhanced_root: data/datasets/downloads/UOv2/train/images
  num_classes: 5
  synthetic_size: 0
  max_objects: 16
  class_names:
    - echinus
    - holothurian
    - scallop
    - starfish
    - waterweeds
  image_size: 640
  workers: 4

model:
  name: qdcr_net
  feature_dim: 64
  num_queries: 16
  backbone: dual_branch
  quality_aware: true
  cross_residual_stages:
    - stage2
    - stage3
  small_object_neck: true

train:
  epochs: 20
  batch_size: 4
  max_batches_per_epoch: 120
  optimizer: adamw
  lr: 0.0003
  weight_decay: 0.0005
  early_stopping:
    enabled: true
    monitor: map50
    mode: max
    patience: 8
    min_delta: 0.000001

eval:
  checkpoint: best
  max_batches: 80
  conf_thresh: 0.01
  iou_thresh: 0.5
