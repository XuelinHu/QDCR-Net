experiment:
  name: baseline_detector
  seed: 42
  output_dir: outputs/checkpoints/baseline_detector
  runs_dir: runs/baseline_detector
  device: cuda

dataset:
  train_root: data/datasets/URPC2018/train/images
  val_root: data/datasets/URPC2018/val/images
  enhanced_root: data/datasets/URPC2018_enhanced
  num_classes: 4
  synthetic_size: 16
  max_objects: 8
  class_names:
    - holothurian
    - echinus
    - starfish
    - scallop
  image_size: 640
  workers: 4

model:
  name: baseline_detector
  feature_dim: 32
  num_queries: 8
  backbone: single_branch
  head: detect_proxy

train:
  epochs: 2
  batch_size: 4
  max_batches_per_epoch: 2
  optimizer: adamw
  lr: 0.0005
  weight_decay: 0.0005

eval:
  max_batches: 2
  conf_thresh: 0.25
  iou_thresh: 0.5
